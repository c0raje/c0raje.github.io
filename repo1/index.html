<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
			letter-spacing: 1px;
			line-height: 1;
		}
		body {
			font-size: 16px;
			font-family: monospace, sans-serif;
			background: var(--background-body);
		}
		:root {
			--background-body: rgb(0 0 30);

      --background-header: rgb(0 0 30);
      --color-header: rgb(255 255 0);
      --color-page-name: rgb(255 255 255);
      --font-size-page-name: 1.4rem;

			--border-color: rgb(255 0 255);

			--color-main-a: rgb(0 255 0);
			--font-size-main-a: 1.2rem;

			--background-footer: rgb(0 0 30);
			--color-footer-text: rgb(255 255 255);
			--color-footer-text-a: rgb(0 255 0);
			--font-size-footer-text: 1.2rem;
		}
		.header {
			background: var(--background-header);
			padding: 10px;
      box-shadow: 0px 4px 10px var(--border-color);
		}
		.header .page-name {
			font-size: var(--font-size-page-name);
			color: var(--color-page-name);
		}
		.main {
			width: 100%;
			height: 100vh;
			padding: 60px;
			display: flex;
			justify-content: center;
			flex-wrap: wrap;
			gap: 10px;
		}
		.main .button {}
		.main .button a {
			background: var(--background-button);
			padding: 12px;
			border-radius: 8px;
			text-decoration: none;
			color: var(--color-main-a);
			font-size: var(--font-size-main-a);
			border: 1px solid var(--border-color);
		}
		.footer {
			padding: 20px 30px;
			background: var(--background-footer);
      box-shadow: 0px -2px 6px var(--border-color);
			display: flex;
			flex-wrap: wrap;
			gap: 10px;
		}
		.footer .footer-text {
			font-size: var(--font-size-footer-text);
			color: var(--color-footer-text);
		}
		.footer .footer-text a {
			text-decoration: none;
			color: var(--color-footer-text-a);
		}

		@media (min-width:720px) {
			:root {
				--font-size-page-name: 1.4rem;

				--font-size-main-a: 1rem;

				--font-size-footer-text: .6rem;
			}
		}
	</style>
	<title>C0raje</title>
</head>
<body>
	<header class="header">
		<p class="page-name">C0raje</p>
	</header>
	<main class="main">
		<div class="button"><a href="https://c0raje.github.io/repo1/calendario">Plantilla para telefono</a></div>
		<div class="button"><a href="https://c0raje.github.io/repo1/calendario">Calendario de bachilleres(2022-2023)</a></div>
		<div class="button"><a href="https://c0raje.github.io/repo1/codigos-html">Codigos html</a></div>
		<div class="button"><a href="https://c0raje.github.io/repo1/ingles">Ingles</a></div>
		<div class="button"><a href="https://c0raje.github.io/repo1/js">JavaScript</a></div>
		<div class="button"><a href="https://c0raje.github.io/repo1/plantilla-verbos">Plantilla verbos</a></div>
		<div class="button"><a href="https://c0raje.github.io/repo1/quiz-1">Quiz 1</a></div>
		<div class="button"><a href="https://c0raje.github.io/repo1/quiz-pronombres">Quiz pronombres</a></div>
		<div class="button"><a href="https://c0raje.github.io/repo1/reloj">Reloj</a></div>
		<div class="button"><a href="https://c0raje.github.io/repo1/verbos">Verbos</a></div>
	</main>
	<footer class="footer">
		<p class="footer-text"><a href="https://c0raje.github.io/">C0raje.github.io</a></p>
		<p class="footer-text">Pagina hecha solo por hobi.</p>
		<p class="footer-text"><a href="https://wa.me/527351156556/">Contactame!</a></p>
	</footer>
</body>
</html>
