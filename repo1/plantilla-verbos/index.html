  <style>
    html, body {

    section, article, .article-text {
      padding: 10px 14px;
      box-shadow: 0px 0px 16px #aaa;
      border-radius: 6px;
    }
    :root {
      --f-s-1: 1rem;

    section {

      gap: 8px;
      width: 86%;
      margin: auto;
      position: relative;
    }
    section:before {

      top: 60%;
      left: 20%;
      font-size: 17rem;
      opacity: 0.04;
      rotate: 20deg;
    }
    section .section-name {
      font-size: var(--f-s-4);
      font-weight: bold;
      padding: 8px;
      box-shadow: 0px 0px 16px #aaa;
      border-radius: 6px;
    }
    section article {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr 1fr 1fr;
      grid-template-rows: auto;
    }
    section article .article-text {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: var(--f-s-1);
      font-weight: 500;
